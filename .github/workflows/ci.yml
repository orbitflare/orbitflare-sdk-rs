name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --features all -- -D warnings

      - name: cargo test
        run: cargo test --features all -- --test-threads=1

      - name: cargo build --no-default-features
        run: cargo build --no-default-features

      - name: cargo build each feature
        run: |
          cargo build --no-default-features --features rpc
          cargo build --no-default-features --features ws
          cargo build --no-default-features --features grpc
          cargo build --no-default-features --features jetstream
          cargo build --no-default-features --features all
